url: https://seanthimons.github.io/boosterpak/

template:
  bootstrap: 5
  includes:
    in_header: |
      <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
      <script>
        document.addEventListener('DOMContentLoaded', function() {
          mermaid.initialize({ startOnLoad: false, theme: 'neutral' });
          document.querySelectorAll('pre.mermaid > code, pre > code.language-mermaid').forEach(function(code) {
            var pre = code.parentElement;
            var div = document.createElement('div');
            div.className = 'mermaid';
            div.textContent = code.textContent;
            pre.parentElement.replaceChild(div, pre);
          });
          mermaid.run();
        });
      </script>

navbar:
  structure:
    left: [reference, articles]
    right: [github]
  components:
    github:
      icon: fab fa-github
      href: https://github.com/seanthimons/boosterpak
      aria-label: GitHub

reference:
  - title: Project workflow
    contents:
      - init
      - sync
      - write_attach
      - status
  - title: Packs
    contents:
      - add_pack
      - add_github_pack
      - remove_pack
      - list_packs
      - create_pack
      - save_pack
      - promote_pack
      - demote_pack
  - title: Helper functions
    contents:
      - add_function
      - remove_function
      - list_functions
      - check_functions
      - diff_function
      - pack_setting
  - title: Bundled helper examples
    contents:
      - geo_mean
      - my_skim
      - theme_custom
      - "%ni%"
