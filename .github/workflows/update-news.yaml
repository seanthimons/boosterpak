name: Update NEWS

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - 'NEWS.md'
      - 'DESCRIPTION'

permissions:
  contents: write

concurrency:
  group: update-news-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  update-news:
    # Fork PRs can't be pushed to with GITHUB_TOKEN; skip them.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ github.token }}

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up R
        uses: r-lib/actions/setup-r@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2
        with:
          use-public-rspm: true

      - name: Install autonewsmd
        uses: r-lib/actions/setup-r-dependencies@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2
        with:
          packages: any::autonewsmd

      - name: Regenerate NEWS.md
        shell: Rscript {0}
        run: |
          package <- read.dcf("DESCRIPTION", fields = "Package")[1, "Package"]
          an <- autonewsmd::autonewsmd$new(repo_name = package, repo_path = getwd())
          an$generate()
          an$write(force = TRUE)

      - name: Commit and push if changed
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add NEWS.md
          if git diff --cached --quiet; then
            echo "No changes to NEWS.md"
          else
            git commit -m "docs: update NEWS.md"
            git push
          fi
