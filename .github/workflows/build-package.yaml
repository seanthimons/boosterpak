name: Build Package

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ github.token }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up R
        uses: r-lib/actions/setup-r@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Set up pandoc
        uses: r-lib/actions/setup-pandoc@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@8a96df13519ee81fd526f2dfca5962811136661b # v2

      - name: Install package dependencies
        uses: r-lib/actions/setup-r-dependencies@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2

      - name: Read package metadata
        id: metadata
        shell: bash
        run: |
          package="$(Rscript -e "cat(read.dcf('DESCRIPTION', fields = 'Package')[1, 'Package'])")"
          version="$(Rscript -e "cat(read.dcf('DESCRIPTION', fields = 'Version')[1, 'Version'])")"
          echo "package=$package" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build source package
        id: build
        env:
          PACKAGE: ${{ steps.metadata.outputs.package }}
          VERSION: ${{ steps.metadata.outputs.version }}
        shell: bash
        run: |
          R CMD build .
          tarball="${PACKAGE}_${VERSION}.tar.gz"
          test -f "$tarball"
          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"

      - name: Upload source package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.metadata.outputs.package }}-${{ steps.metadata.outputs.version }}-source
          path: ${{ steps.build.outputs.tarball }}
          if-no-files-found: error
          retention-days: 14
