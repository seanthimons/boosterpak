name: Release

on:
  pull_request:
    branches: [main]
    types: [closed]
  workflow_dispatch:
    inputs:
      version_type:
        description: Version bump for this release
        required: true
        default: patch
        type: choice
        options:
          - none
          - patch
          - minor
          - major
      release_note:
        description: Release note for manual releases
        required: false
        default: Manual release.

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure git user
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Resolve release version
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          VERSION_TYPE: ${{ inputs.version_type }}
          MANUAL_RELEASE_NOTE: ${{ inputs.release_note }}
        shell: bash
        run: |
          git pull --ff-only origin main

          Rscript - <<'RSCRIPT'
          clean_line <- function(x) {
            gsub("\\s+", " ", trimws(x))
          }

          bump_version <- function(version, version_type) {
            parts <- strsplit(version, ".", fixed = TRUE)[[1]]
            if (!(length(parts) %in% c(3L, 4L)) || any(!grepl("^[0-9]+$", parts))) {
              stop("DESCRIPTION Version must have three or four numeric components: ", version)
            }

            numeric_parts <- as.integer(parts[seq_len(3L)])
            if (identical(version_type, "major")) {
              numeric_parts[1] <- numeric_parts[1] + 1L
              numeric_parts[2] <- 0L
              numeric_parts[3] <- 0L
            } else if (identical(version_type, "minor")) {
              numeric_parts[2] <- numeric_parts[2] + 1L
              numeric_parts[3] <- 0L
            } else if (identical(version_type, "patch")) {
              numeric_parts[3] <- numeric_parts[3] + 1L
            } else if (identical(version_type, "none")) {
              return(version)
            } else {
              stop("Unsupported release version_type: ", version_type)
            }

            paste(as.character(numeric_parts), collapse = ".")
          }

          desc <- readLines("DESCRIPTION", warn = FALSE)
          version_line <- grep("^Version:[[:space:]]*", desc)
          if (length(version_line) != 1) {
            stop("DESCRIPTION must contain exactly one Version field.")
          }

          current_version <- sub("^Version:[[:space:]]*", "", desc[version_line])
          event_name <- Sys.getenv("EVENT_NAME")
          version_type <- clean_line(Sys.getenv("VERSION_TYPE"))
          if (identical(event_name, "pull_request")) {
            version_type <- "patch"
          } else if (!nzchar(version_type)) {
            version_type <- "patch"
          }

          new_version <- bump_version(current_version, version_type)
          tag <- paste0("v", new_version)

          local_tag_exists <- system2(
            "git",
            c("rev-parse", "-q", "--verify", paste0("refs/tags/", tag)),
            stdout = TRUE,
            stderr = TRUE
          )
          remote_tag_status <- system2(
            "git",
            c("ls-remote", "--exit-code", "--tags", "origin", paste0("refs/tags/", tag)),
            stdout = TRUE,
            stderr = TRUE
          )
          remote_tag_exists <- identical(attr(remote_tag_status, "status"), 0L) ||
            (is.null(attr(remote_tag_status, "status")) && length(remote_tag_status) > 0)

          if (length(local_tag_exists) > 0 || isTRUE(remote_tag_exists)) {
            stop("Release tag ", tag, " already exists.")
          }

          commit_needed <- !identical(version_type, "none")
          if (commit_needed) {
            desc[version_line] <- paste("Version:", new_version)
            writeLines(desc, "DESCRIPTION")
          }

          pr_number <- clean_line(Sys.getenv("PR_NUMBER"))
          pr_title <- clean_line(Sys.getenv("PR_TITLE"))
          manual_note <- clean_line(Sys.getenv("MANUAL_RELEASE_NOTE"))

          if (nzchar(pr_number)) {
            note <- paste0("* Release from PR #", pr_number, ": ", pr_title)
          } else if (nzchar(manual_note)) {
            note <- paste0("* ", manual_note)
          } else {
            note <- "* Manual release."
          }

          if (commit_needed) {
            news <- readLines("NEWS.md", warn = FALSE)
            new_section <- c(
              paste0("# boosterpak ", new_version),
              "",
              note,
              ""
            )
            writeLines(c(new_section, news), "NEWS.md")
          }

          notes_path <- file.path(Sys.getenv("RUNNER_TEMP"), "release-notes.md")
          writeLines(note, notes_path)

          output <- Sys.getenv("GITHUB_OUTPUT")
          write(paste0("previous_version=", current_version), output, append = TRUE)
          write(paste0("version=", new_version), output, append = TRUE)
          write(paste0("version_type=", version_type), output, append = TRUE)
          write(paste0("tag=", tag), output, append = TRUE)
          write(paste0("commit_needed=", tolower(commit_needed)), output, append = TRUE)
          write(paste0("notes_path=", notes_path), output, append = TRUE)
          RSCRIPT

      - name: Install package dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        env:
          GITHUB_PAT: ${{ github.token }}
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - name: Validate release
        run: Rscript -e "rcmdcheck::rcmdcheck(args = '--no-manual', error_on = 'warning')"

      - name: Build source package
        id: build
        env:
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          R CMD build . --no-manual
          mkdir -p "$RUNNER_TEMP/pkg-build"
          mv "boosterpak_${VERSION}.tar.gz" "$RUNNER_TEMP/pkg-build/"
          echo "tarball=$RUNNER_TEMP/pkg-build/boosterpak_${VERSION}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        if: steps.version.outputs.commit_needed == 'true'
        id: commit
        env:
          VERSION: ${{ steps.version.outputs.version }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          git add DESCRIPTION NEWS.md
          commit_message="chore: bump package version to $VERSION"
          if [ -n "$PR_NUMBER" ]; then
            commit_message="$commit_message (#$PR_NUMBER)"
          fi
          git commit -m "$commit_message"
          git push origin HEAD:main

      - name: Resolve release commit
        id: release_commit
        shell: bash
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create tag and GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ steps.release_commit.outputs.sha }}
          TAG: ${{ steps.version.outputs.tag }}
          NOTES_PATH: ${{ steps.version.outputs.notes_path }}
          TARBALL: ${{ steps.build.outputs.tarball }}
        shell: bash
        run: |
          git tag -a "$TAG" -m "Release $TAG" "$RELEASE_SHA"
          git push origin "refs/tags/$TAG"
          gh release create "$TAG" "$TARBALL#Source package" \
            --target "$RELEASE_SHA" \
            --title "$TAG" \
            --notes-file "$NOTES_PATH" \
            --verify-tag
